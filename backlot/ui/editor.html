<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Backlot — Production Studio</title>
<link rel="stylesheet" href="/ui/board.css">
<style>
  html, body { height: 100%; margin: 0; }
  body { display: flex; flex-direction: column; }
  header.slate { flex: 0 0 auto; }
  #studio-root { flex: 1 1 auto; min-height: 0; }
  #studio-fallback { padding: 16px 24px 60px; }
</style>
</head>
<body>
  <header class="slate">
    <div class="clapper"></div>
    <div>
      <span class="wordmark">Backlot</span>
      <h1 id="edTitle">Production Studio</h1>
    </div>
    <span class="chip" id="edTarget">Remotion · live preview = final render</span>
    <div class="spacer"></div>
    <a class="chip nav-chip" id="edClassic" href="#">Classic editor</a>
    <a class="chip nav-chip" id="edBoardLink" href="#">← BOARD</a>
  </header>

  <!-- The real @remotion/player production studio mounts here. -->
  <div id="studio-root"></div>
  <!-- Classic deterministic editor (fallback via ?classic=1). Legacy editor.js paints into #edBody. -->
  <div id="edBody" style="display:none;padding:16px 24px 60px"></div>

  <script>
  (function () {
    // Parse project id from /p/<id>/editor
    var m = location.pathname.match(/\/p\/([^/]+)\/editor/);
    var projectId = m ? decodeURIComponent(m[1]) : "";
    var classic = new URLSearchParams(location.search).get("classic") === "1";
    // Wire the header links.
    var boardLink = document.getElementById("edBoardLink");
    if (boardLink) boardLink.href = "/p/" + encodeURIComponent(projectId);
    var classicLink = document.getElementById("edClassic");
    if (classicLink) {
      classicLink.href = classic
        ? "/p/" + encodeURIComponent(projectId) + "/editor"
        : "/p/" + encodeURIComponent(projectId) + "/editor?classic=1";
      classicLink.textContent = classic ? "Studio" : "Classic editor";
    }

    if (classic) {
      // Load the legacy deterministic editor into the fallback container.
      document.getElementById("studio-root").style.display = "none";
      document.getElementById("edBody").style.display = "block";
      var s = document.createElement("script");
      s.type = "module";
      s.src = "/ui/editor.js?v=film-render-1";
      document.body.appendChild(s);
      return;
    }

    // Default: the real Remotion production studio.
    var bundle = document.createElement("script");
    bundle.src = "/ui/studio.bundle.js?v=0542557e87b3";
    bundle.onload = function () {
      if (window.BacklotStudio && window.BacklotStudio.mount) {
        window.BacklotStudio.mount(document.getElementById("studio-root"), {
          projectId: projectId,
        });
      } else {
        document.getElementById("studio-root").innerHTML =
          '<div style="padding:24px;color:#e5544b">Studio bundle failed to load.</div>';
      }
    };
    bundle.onerror = function () {
      document.getElementById("studio-root").innerHTML =
        '<div style="padding:24px;color:#e5544b">Could not load /ui/studio.bundle.js. ' +
        'Run <code>npm run build:studio</code> in remotion-composer/.</div>';
    };
    document.body.appendChild(bundle);
  })();
  </script>
</body>
</html>
