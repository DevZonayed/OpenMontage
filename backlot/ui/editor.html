<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Backlot — Production Studio</title>
<link rel="stylesheet" href="/ui/board.css">
<style>
  html, body { height: 100%; margin: 0; }
  body { display: flex; flex-direction: column; }
  header.slate { flex: 0 0 auto; }
  #studio-root { flex: 1 1 auto; min-height: 0; }
  #studio-fallback { padding: 16px 24px 60px; }
</style>
</head>
<body>
  <header class="slate">
    <div class="clapper"></div>
    <div>
      <span class="wordmark">Backlot</span>
      <h1 id="edTitle">Production Studio</h1>
    </div>
    <span class="chip" id="edTarget">Remotion · live preview = final render</span>
    <div class="spacer"></div>
    <a class="chip nav-chip" id="edBoardLink" href="#">← BOARD</a>
  </header>

  <!-- The real @remotion/player manual editor mounts here. -->
  <div id="studio-root"></div>

  <script>
  (function () {
    // Parse project id from /p/<id>/editor
    var m = location.pathname.match(/\/p\/([^/]+)\/editor/);
    var projectId = m ? decodeURIComponent(m[1]) : "";
    // Wire the header link back to the board.
    var boardLink = document.getElementById("edBoardLink");
    if (boardLink) boardLink.href = "/p/" + encodeURIComponent(projectId);

    // The Remotion manual editor (the only editor surface).
    var bundle = document.createElement("script");
    bundle.src = "/ui/studio.bundle.js?v=e4ed9a36d5d6";
    bundle.onload = function () {
      if (window.BacklotStudio && window.BacklotStudio.mount) {
        window.BacklotStudio.mount(document.getElementById("studio-root"), {
          projectId: projectId,
        });
      } else {
        document.getElementById("studio-root").innerHTML =
          '<div style="padding:24px;color:#e5544b">Studio bundle failed to load.</div>';
      }
    };
    bundle.onerror = function () {
      document.getElementById("studio-root").innerHTML =
        '<div style="padding:24px;color:#e5544b">Could not load /ui/studio.bundle.js. ' +
        'Run <code>npm run build:studio</code> in remotion-composer/.</div>';
    };
    document.body.appendChild(bundle);
  })();
  </script>
</body>
</html>
