<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Backlot — Library</title>
<link rel="stylesheet" href="/ui/board.css">
</head>
<body>
<div class="wrap">
  <header class="slate">
    <div class="clapper"></div>
    <div>
      <span class="wordmark">Backlot</span>
      <h1>Library</h1>
    </div>
    <span class="chip" id="count"></span>
    <div class="spacer"></div>
    <button class="chip nav-chip primary" type="button" data-new-project>+ NEW PROJECT</button>
    <a class="chip nav-chip" href="/settings">⚙ SETTINGS</a>
    <span class="live idle" id="liveBadge"><span class="dot"></span><span id="liveText">IDLE</span></span>
  </header>
  <div class="lib-grid" id="grid"></div>
  <div class="empty-cta" id="empty" style="display:none">
    <p class="hint">No projects yet — create one to initialize a workspace.</p>
    <button class="set-btn" type="button" data-new-project>+ New project</button>
  </div>
</div>
<script type="module" src="/ui/library.js"></script>
</body>
</html>
